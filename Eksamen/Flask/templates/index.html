<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kantine nettbutikk</title>
    <link rel="stylesheet" href="../static/style.css">
</head>
<body>
    <div class="produkter">
        <table class="produkt-tabell">
            <tr>
                <th>Navn</th>
                <th>Pris</th>
                <th>Beskrivelse</th>
                <th>Lager</th>
            </tr>
            {% for produkt in produkter %}
            <tr>
                <td>{{ produkt[1] }}</td>
                <td>{{ produkt[2] }}</td>
                <td>{{ produkt[3] }}</td>
                <td>{{ produkt[4] }}</td>
            </tr>
            {% endfor %}
        </table>
    </div>
</body>
</html>
